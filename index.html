<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Deutsch Test</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
<style>
:root {
  --plum: #5B365E;
  --lilac: #CBBEC8;
  --snow: #EAEAEA;
  --gold: #E6C115;
  --plum-dark: #3e2441;
  --plum-light: #7a4d7e;
  --correct: #2e7d32;
  --wrong: #c62828;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Lato', sans-serif; background: var(--snow); color: var(--plum-dark); min-height: 100vh; }

/* HEADER */
header {
  background: var(--plum);
  padding: 18px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(91,54,94,0.35);
}
header h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: var(--gold); letter-spacing: 2px; }
header h1 span { color: var(--lilac); font-weight: 400; }

#adminBtn {
  background: transparent;
  border: 2px solid var(--gold);
  color: var(--gold);
  padding: 8px 18px;
  border-radius: 30px;
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 1px;
  font-family: 'Lato', sans-serif;
  transition: background .2s, color .2s;
}
#adminBtn:hover { background: var(--gold); color: var(--plum); }

/* MAIN */
main { max-width: 760px; margin: 0 auto; padding: 40px 18px 80px; }

/* CARD */
.card { background: #fff; border-radius: 12px; box-shadow: 0 6px 30px rgba(91,54,94,0.13); overflow: hidden; margin-bottom: 24px; }
.card-top { background: var(--plum); padding: 26px 32px; }
.card-top h2 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: #fff; margin-bottom: 6px; }
.card-top p { font-size: 0.88rem; color: var(--lilac); }
.card-body { padding: 32px; }

/* SCREENS */
.screen { display: none; }
.screen.active { display: block; }

/* NAME FORM */
.form-label { display: block; font-weight: 700; color: var(--plum); margin-bottom: 8px; font-size: 0.95rem; }
.form-input {
  width: 100%; padding: 13px 16px;
  border: 2px solid var(--lilac); border-radius: 10px;
  font-size: 1rem; font-family: 'Lato', sans-serif;
  color: var(--plum-dark); outline: none;
  transition: border-color .2s;
}
.form-input:focus { border-color: var(--plum); }
.err { color: var(--wrong); font-size: 0.85rem; margin-top: 8px; min-height: 20px; }

/* BUTTONS */
.btn {
  display: inline-block;
  margin-top: 22px;
  background: var(--plum);
  color: #fff;
  border: none;
  padding: 13px 34px;
  border-radius: 30px;
  font-size: 0.98rem;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  font-family: 'Lato', sans-serif;
  transition: background .2s;
}
.btn:hover { background: var(--plum-light); }
.btn:disabled { background: var(--lilac); cursor: not-allowed; }

/* PROGRESS */
.progress-wrap { height: 6px; background: var(--lilac); border-radius: 4px; margin-bottom: 32px; overflow: hidden; }
.progress-bar { height: 100%; background: var(--gold); border-radius: 4px; width: 0%; transition: width .35s; }

/* QUESTION */
.q-block { margin-bottom: 30px; padding-bottom: 30px; border-bottom: 1px solid var(--snow); }
.q-block:last-of-type { border-bottom: none; margin-bottom: 0; }
.q-num { font-size: 0.72rem; font-weight: 700; letter-spacing: 2px; color: var(--plum-light); text-transform: uppercase; margin-bottom: 5px; }
.q-text { font-size: 1.02rem; font-weight: 700; color: var(--plum-dark); margin-bottom: 14px; line-height: 1.5; }

/* PASSAGE */
.passage { background: var(--snow); border-left: 4px solid var(--gold); border-radius: 0 10px 10px 0; padding: 16px 20px; margin-bottom: 26px; font-size: 0.93rem; line-height: 1.75; color: #444; }
.passage-lbl { font-weight: 700; font-size: 0.78rem; color: var(--plum); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }

/* OPTIONS */
.options { display: flex; flex-direction: column; gap: 9px; }
.opt-label {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 15px;
  border: 2px solid var(--lilac); border-radius: 10px;
  cursor: pointer; font-size: 0.93rem;
  transition: border-color .15s, background .15s;
  line-height: 1.4;
}
.opt-label:hover { border-color: var(--plum-light); background: #f9f5fa; }
.opt-label.selected { border-color: var(--plum); background: #f0e8f1; }
.opt-label.locked { cursor: default; pointer-events: none; }
.opt-label.ok  { border-color: var(--correct); background: #e8f5e9; color: var(--correct); font-weight: 700; }
.opt-label.bad { border-color: var(--wrong);   background: #ffebee; color: var(--wrong);   font-weight: 700; }
.opt-label input[type=radio] { accent-color: var(--plum); width: 17px; height: 17px; flex-shrink: 0; }
.opt-icon { margin-left: auto; }

/* DIVIDER */
.sect-div { display: flex; align-items: center; gap: 12px; margin: 28px 0 22px; }
.sect-div hr { flex: 1; border: none; border-top: 1px solid var(--lilac); }
.sect-div span { font-family: 'Playfair Display', serif; font-size: 0.88rem; color: var(--plum-light); white-space: nowrap; font-style: italic; }

/* SUBMIT ROW */
.submit-row { text-align: center; padding: 0 32px 32px; }
.email-note { font-size: 0.78rem; color: var(--plum-light); margin-top: 12px; }

/* RESULT BANNER */
.result-banner { text-align: center; padding: 34px; background: var(--plum); color: #fff; }
.result-grade { font-family: 'Playfair Display', serif; font-size: 3.8rem; color: var(--gold); line-height: 1; }
.result-grade-lbl { font-size: 0.8rem; letter-spacing: 2px; color: var(--lilac); text-transform: uppercase; margin-top: 5px; }
.result-score { margin-top: 12px; font-size: 1.05rem; opacity: .9; }

/* RESULT ITEMS */
.ri { margin-bottom: 26px; padding-bottom: 26px; border-bottom: 1px solid var(--snow); }
.ri:last-child { border-bottom: none; margin-bottom: 0; }
.ri-status { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.74rem; font-weight: 700; letter-spacing: .4px; }
.badge-ok  { background: #e8f5e9; color: var(--correct); border: 1px solid var(--correct); }
.badge-bad { background: #ffebee; color: var(--wrong);   border: 1px solid var(--wrong); }
.ri-q { font-size: .93rem; font-weight: 700; color: var(--plum-dark); margin-bottom: 5px; }
.ri-ans { font-size: .88rem; }
.ri-hint { font-size: .82rem; color: var(--correct); margin-top: 5px; }

/* ADMIN OVERLAY */
#adminOverlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(30,10,32,0.65);
  z-index: 200;
  justify-content: center;
  align-items: flex-start;
  padding: 36px 14px;
  overflow-y: auto;
}
#adminOverlay.open { display: flex; }
#adminPanel { background: #fff; border-radius: 12px; width: 100%; max-width: 800px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
.ap-head { background: var(--plum); padding: 20px 26px; display: flex; align-items: center; justify-content: space-between; }
.ap-head h2 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.25rem; }
#adminClose { background: transparent; border: none; color: var(--lilac); font-size: 1.5rem; cursor: pointer; line-height: 1; }
#adminClose:hover { color: #fff; }
.ap-body { padding: 26px; }
.ap-login { text-align: center; }
.ap-login label { display: block; font-weight: 700; color: var(--plum); margin-bottom: 8px; }
#adminPass { padding: 11px 15px; border: 2px solid var(--lilac); border-radius: 10px; font-size: 1rem; outline: none; width: 250px; max-width: 100%; font-family: 'Lato', sans-serif; text-align: center; }
#adminPass:focus { border-color: var(--plum); }
.ap-err { color: var(--wrong); font-size: 0.85rem; margin-top: 7px; }
#resTable { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
#resTable th { background: var(--plum); color: var(--gold); padding: 10px 12px; text-align: left; }
#resTable td { padding: 10px 12px; border-bottom: 1px solid var(--snow); vertical-align: top; }
#resTable tr:last-child td { border-bottom: none; }
#resTable tr:nth-child(even) td { background: #faf7fb; }
.no-res { text-align: center; color: var(--plum-light); padding: 40px 0; font-style: italic; }
</style>
</head>
<body>

<header>
  <h1>Deutsch <span>Test</span></h1>
  <button id="adminBtn">&#128202; Ergebnisse</button>
</header>

<main>
  <!-- SCREEN 1: Name -->
  <div id="screen-name" class="screen active">
    <div class="card">
      <div class="card-top">
        <h2>Willkommen zum Deutsch Test</h2>
        <p>Niveau A2 &nbsp;&middot;&nbsp; Grammatik &amp; Leseverstehen &nbsp;&middot;&nbsp; 15 Fragen</p>
      </div>
      <div class="card-body">
        <label class="form-label" for="nameInput">Bitte gib deinen Vornamen ein:</label>
        <input class="form-input" type="text" id="nameInput" placeholder="z. B. Maria" autocomplete="off" />
        <div class="err" id="nameErr"></div>
        <button class="btn" id="startBtn">Test starten &#8594;</button>
      </div>
    </div>
  </div>

  <!-- SCREEN 2: Quiz -->
  <div id="screen-quiz" class="screen">
    <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="card">
      <div class="card-body" id="qContainer"></div>
      <div class="submit-row">
        <button class="btn" id="submitBtn">Antworten senden &#10003;</button>
        <p class="email-note">Nach dem Absenden wird die Lehrperson benachrichtigt.</p>
      </div>
    </div>
  </div>

  <!-- SCREEN 3: Result -->
  <div id="screen-result" class="screen">
    <div class="card">
      <div class="result-banner">
        <div class="result-grade" id="resGrade">-</div>
        <div class="result-grade-lbl">Gesamtnote</div>
        <div class="result-score" id="resScore"></div>
      </div>
      <div class="card-body" id="resBody"></div>
    </div>
  </div>
</main>

<!-- ADMIN -->
<div id="adminOverlay">
  <div id="adminPanel">
    <div class="ap-head">
      <h2>&#128202; Ergebnisübersicht</h2>
      <button id="adminClose">&#10005;</button>
    </div>
    <div class="ap-body">
      <div id="apLogin" class="ap-login">
        <label for="adminPass">Passwort eingeben:</label>
        <br>
        <input type="password" id="adminPass" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" />
        <div class="ap-err" id="apErr"></div>
        <br>
        <button class="btn" id="apLoginBtn">Anmelden</button>
      </div>
      <div id="apResults" style="display:none;">
        <table id="resTable">
          <thead>
            <tr>
              <th>#</th><th>Name</th><th>Note</th><th>Richtig</th><th>Fehler bei Fragen</th>
            </tr>
          </thead>
          <tbody id="resTbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
var ADMIN_PW  = "lehrer2024";
var STORE_KEY = "dt_results_v2";
var NOTIFY    = "fidah.sayed@yahoo.com";

var PASSAGE = "Anna wohnt in München. Sie steht jeden Morgen um 7 Uhr auf und frühstückt mit ihrer Familie. Dann fährt sie mit dem Bus zur Arbeit. Sie arbeitet als Lehrerin in einer Grundschule. Nach der Arbeit geht sie oft einkaufen oder trifft Freunde im Café. Am Wochenende macht sie gerne Ausflüge in die Berge.";

var QS = [
  { sec:"Grammatik - Artikel & Kasus", text:'Was ist der richtige Artikel für "Tisch"?', opts:["die","der","das"], ans:1 },
  { text:'Ergänze: "Ich gebe ___ Frau das Buch." (Dativ)', opts:["die","der","das"], ans:1 },
  { text:'Welche Form ist richtig? "Er hat ___ Hund gefüttert."', opts:["den","dem","der"], ans:0 },
  { text:'Ergänze: "Das ist ___ Auto meines Vaters." (Genitiv)', opts:["den","dem","das"], ans:2 },
  { text:'Was ist der Plural von "das Kind"?', opts:["die Kinds","die Kinder","die Kindes"], ans:1 },
  { sec:"Grammatik - Verben & Zeiten", text:'Welche Form ist korrekt? "Gestern ___ ich ins Kino gegangen."', opts:["habe","bin","hatte"], ans:1 },
  { text:'Konjugiere: "sie (Plural) ___ jeden Tag Sport."', opts:["mache","macht","machen"], ans:2 },
  { text:'Welches Verb passt? "Ich ___ gerne Musik."', opts:["höre","sehe","spreche"], ans:0 },
  { text:'Was ist die richtige Vergangenheitsform? "Er ___ gestern nicht zur Schule."', opts:["geht","ging","ist gegangen"], ans:1 },
  { text:'Ergänze mit dem richtigen Modalverb: "Du ___ hier nicht rauchen!"', opts:["kannst","willst","darfst"], ans:2 },
  { sec:"Leseverstehen", pass:true, text:"Wo wohnt Anna?", opts:["Berlin","Hamburg","München"], ans:2 },
  { text:"Wie kommt Anna zur Arbeit?", opts:["Mit dem Auto","Mit dem Bus","Zu Fuß"], ans:1 },
  { text:"Was ist Annas Beruf?", opts:["Ärztin","Köchin","Lehrerin"], ans:2 },
  { text:"Was macht Anna nach der Arbeit?", opts:["Sie schläft sofort","Sie lernt Deutsch","Sie geht einkaufen oder trifft Freunde"], ans:2 },
  { text:"Was macht Anna am Wochenende?", opts:["Sie bleibt zu Hause","Sie macht Ausflüge in die Berge","Sie arbeitet extra"], ans:1 }
];

var _mem = [];
function dbLoad() { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch(e) { return _mem; } }
function dbSave(e) { try { var a=dbLoad(); a.push(e); localStorage.setItem(STORE_KEY,JSON.stringify(a)); } catch(ex) { _mem.push(e); } }
function dbHas(n) { var all=dbLoad(); for(var i=0;i<all.length;i++){ if(all[i].name.trim().toLowerCase()===n.trim().toLowerCase()) return true; } return false; }

var userName = "";
var chosen = [];
for(var i=0;i<QS.length;i++) chosen.push(null);

function showScreen(id) {
  var screens = document.querySelectorAll(".screen");
  for(var i=0;i<screens.length;i++) screens[i].classList.remove("active");
  document.getElementById(id).classList.add("active");
  window.scrollTo(0,0);
}

function calcGrade(c,t) {
  var p=c/t;
  if(p>=0.975) return "1+"; if(p>=0.925) return "1";  if(p>=0.875) return "1-";
  if(p>=0.825) return "2+"; if(p>=0.775) return "2";  if(p>=0.725) return "2-";
  if(p>=0.675) return "3+"; if(p>=0.625) return "3";  if(p>=0.575) return "3-";
  if(p>=0.525) return "4+"; if(p>=0.475) return "4";  if(p>=0.425) return "4-";
  if(p>=0.375) return "5+"; if(p>=0.325) return "5";  if(p>=0.275) return "5-";
  return "6";
}

function buildQuiz() {
  var c = document.getElementById("qContainer");
  c.innerHTML = "";
  var passShown = false;

  for(var i=0;i<QS.length;i++) {
    var q = QS[i];

    if(q.sec) {
      var d = document.createElement("div");
      d.className = "sect-div";
      d.innerHTML = "<hr><span>" + q.sec + "</span><hr>";
      c.appendChild(d);
    }

    if(q.pass && !passShown) {
      passShown = true;
      var p = document.createElement("div");
      p.className = "passage";
      p.innerHTML = "<div class='passage-lbl'>Lesetext</div>" + PASSAGE;
      c.appendChild(p);
    }

    var b = document.createElement("div");
    b.className = "q-block";
    b.id = "qb-" + i;

    var optsHtml = "";
    for(var oi=0;oi<q.opts.length;oi++) {
      optsHtml += '<label class="opt-label" id="lbl-'+i+'-'+oi+'">' +
                  '<input type="radio" name="q'+i+'" value="'+oi+'" /> ' +
                  q.opts[oi] + '</label>';
    }

    b.innerHTML = '<div class="q-num">Frage ' + (i+1) + ' / ' + QS.length + '</div>' +
                  '<div class="q-text">' + q.text + '</div>' +
                  '<div class="options">' + optsHtml + '</div>';
    c.appendChild(b);

    (function(qi) {
      var radios = document.getElementById("qb-"+qi).querySelectorAll('input[type=radio]');
      for(var r=0;r<radios.length;r++) {
        radios[r].addEventListener("change", function() {
          chosen[qi] = parseInt(this.value);
          for(var oi2=0;oi2<QS[qi].opts.length;oi2++) {
            var lbl = document.getElementById("lbl-"+qi+"-"+oi2);
            if(chosen[qi]===oi2) lbl.classList.add("selected");
            else lbl.classList.remove("selected");
          }
          var done=0; for(var k=0;k<chosen.length;k++) if(chosen[k]!==null) done++;
          document.getElementById("progressBar").style.width = (done/QS.length*100)+"%";
        });
      }
    })(i);
  }
}

function doSubmit() {
  var first = -1;
  for(var i=0;i<chosen.length;i++) { if(chosen[i]===null) { first=i; break; } }
  if(first !== -1) {
    var el = document.getElementById("qb-"+first);
    el.scrollIntoView({behavior:"smooth",block:"center"});
    el.style.outline = "2px solid #c62828";
    setTimeout(function(){ el.style.outline=""; }, 2500);
    alert("Bitte beantworte alle " + QS.length + " Fragen.");
    return;
  }

  var radios = document.querySelectorAll("#screen-quiz input[type=radio]");
  for(var r=0;r<radios.length;r++) radios[r].disabled = true;
  document.getElementById("submitBtn").disabled = true;

  for(var i=0;i<QS.length;i++) {
    var q = QS[i];
    for(var oi=0;oi<q.opts.length;oi++) {
      var lbl = document.getElementById("lbl-"+i+"-"+oi);
      lbl.classList.remove("selected");
      lbl.classList.add("locked");
      if(oi===q.ans) {
        lbl.classList.add("ok");
        lbl.innerHTML += '<span class="opt-icon">&#10003;</span>';
      } else if(oi===chosen[i]) {
        lbl.classList.add("bad");
        lbl.innerHTML += '<span class="opt-icon">&#10007;</span>';
      }
    }
  }

  var correct=0, wrong=[];
  for(var i=0;i<QS.length;i++) {
    if(chosen[i]===QS[i].ans) correct++;
    else wrong.push(i+1);
  }
  var g = calcGrade(correct, QS.length);

  var entry = {
    name: userName,
    ts: new Date().toLocaleString("de-DE"),
    answers: chosen.slice(),
    correct: correct,
    total: QS.length,
    grade: g,
    wrong: wrong
  };
  dbSave(entry);

  setTimeout(function() { buildResult(entry); showScreen("screen-result"); }, 600);
}

function buildResult(e) {
  document.getElementById("resGrade").textContent = e.grade;
  document.getElementById("resScore").textContent = e.name + " - " + e.correct + " von " + e.total + " Fragen richtig";
  var body = document.getElementById("resBody");
  body.innerHTML = "";
  for(var i=0;i<QS.length;i++) {
    var q = QS[i];
    var ok = (e.answers[i] === q.ans);
    var d = document.createElement("div");
    d.className = "ri";
    d.innerHTML =
      '<div class="ri-status">' +
        '<span class="q-num" style="margin:0">Frage ' + (i+1) + '</span>' +
        '<span class="badge ' + (ok?"badge-ok":"badge-bad") + '">' + (ok?"&#10003; Richtig":"&#10007; Falsch") + '</span>' +
      '</div>' +
      '<div class="ri-q">' + q.text + '</div>' +
      '<div class="ri-ans">Deine Antwort: <strong>' + q.opts[e.answers[i]] + '</strong></div>' +
      (!ok ? '<div class="ri-hint">Richtige Antwort: ' + q.opts[q.ans] + '</div>' : "");
    body.appendChild(d);
  }
}

function renderAdmin() {
  var all = dbLoad();
  var tbody = document.getElementById("resTbody");
  tbody.innerHTML = "";
  if(!all.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="no-res">Noch keine Ergebnisse.</td></tr>';
    return;
  }
  for(var i=0;i<all.length;i++) {
    var r = all[i];
    var tr = document.createElement("tr");
    tr.innerHTML =
      '<td>' + (i+1) + '</td>' +
      '<td><strong>' + r.name + '</strong><br><small style="color:#999">' + r.ts + '</small></td>' +
      '<td><strong>' + r.grade + '</strong></td>' +
      '<td>' + r.correct + ' / ' + r.total + '</td>' +
      '<td>' + (r.wrong && r.wrong.length ? r.wrong.map(function(n){return"F"+n;}).join(", ") : "-") + '</td>';
    tbody.appendChild(tr);
  }
}

window.addEventListener("load", function() {

  document.getElementById("startBtn").onclick = function() {
    var name = document.getElementById("nameInput").value.trim();
    var err  = document.getElementById("nameErr");
    if(!name) { err.textContent = "Bitte gib deinen Vornamen ein."; return; }
    if(dbHas(name)) { err.textContent = name + " hat bereits teilgenommen."; return; }
    err.textContent = "";
    userName = name;
    for(var i=0;i<QS.length;i++) chosen[i]=null;
    buildQuiz();
    showScreen("screen-quiz");
  };

  document.getElementById("nameInput").onkeydown = function(e) {
    if(e.key==="Enter") document.getElementById("startBtn").onclick();
  };

  document.getElementById("submitBtn").onclick = doSubmit;

  document.getElementById("adminBtn").onclick = function() {
    document.getElementById("adminOverlay").classList.add("open");
    document.getElementById("apLogin").style.display = "block";
    document.getElementById("apResults").style.display = "none";
    document.getElementById("adminPass").value = "";
    document.getElementById("apErr").textContent = "";
  };

  document.getElementById("adminClose").onclick = function() {
    document.getElementById("adminOverlay").classList.remove("open");
  };

  document.getElementById("adminOverlay").onclick = function(e) {
    if(e.target===this) this.classList.remove("open");
  };

  document.getElementById("apLoginBtn").onclick = function() {
    var pw = document.getElementById("adminPass").value;
    if(pw===ADMIN_PW) {
      document.getElementById("apLogin").style.display = "none";
      document.getElementById("apResults").style.display = "block";
      renderAdmin();
    } else {
      document.getElementById("apErr").textContent = "Falsches Passwort.";
    }
  };

  document.getElementById("adminPass").onkeydown = function(e) {
    if(e.key==="Enter") document.getElementById("apLoginBtn").onclick();
  };

});
</script>
</body>
</html>
